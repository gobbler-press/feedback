name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: client
    attributes:
      label: Where did you encounter this?
      options:
        - Gobbler web app
        - Reader API client
        - REST API client (direct)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I try to [action], [unexpected result] happens instead of [expected result]."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to …
        2. Click on …
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / client version
      description: If using the web app, your browser and version. If using a native client, the app version.
      placeholder: "e.g. Safari 18.2 / Unread 2.4.1 / NetNewsWire 6.1.6"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15.3 / iOS 18.2 / Windows 11"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, error messages, console output, or anything else that might help.
    validations:
      required: false
